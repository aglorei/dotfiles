---
galaxy_info:
  author: aglorei
  description: Set up dotfiles playlist as an ansible-pull cron
  license: MIT
  min_ansible_version: 2.10.3
  platforms:
    - name: Archlinux
      versions:
        - any
    - name: MacOSX
      versions:
        - 10.15
    - name: Ubuntu
      versions:
        - focal

dependencies:
  - role: packages
    vars:
      apt_packages:
        - neovim
      homebrew_brews:
        - neovim
      pacman_packages:
        - neovim
