---
- name: Ensure config file directories
  ansible.builtin.file:
    path: "{{ config.dest | dirname }}"
    mode: "{{ config.dir_mode }}"
    state: directory
  loop: "{{ config_files }}"
  loop_control:
    loop_var: config
  when: config.dir_mode is defined
  no_log: true

- name: Copy config files
  ansible.builtin.copy:
    content: "{{ config.content }}"
    dest: "{{ config.dest }}"
    mode: "{{ config.mode }}"
  loop: "{{ config_files }}"
  loop_control:
    loop_var: config
  no_log: true

- name: Synchronize directories
  ansible.posix.synchronize:
    src: "{{ config.src }}/"
    dest: "{{ config.dest }}/"
    checksum: true
    recursive: true
    times: false
  loop: "{{ config_dirs }}"
  loop_control:
    loop_var: config
