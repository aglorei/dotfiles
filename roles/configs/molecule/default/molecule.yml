---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: ubuntu_focal
    image: geerlingguy/docker-ubuntu2004-ansible
    capabilities:
      - SYS_ADMIN
    command: "/usr/sbin/init"
    groups:
      - group_test_1
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      stdout_callback: debug
  inventory:
    group_vars:
      group_test_1:
        config_files:
          - content: |
              DOG
            dest: "{{ ansible_user_dir }}/animal"
            mode: "0400"
          - content: |
              RED
            dest: "{{ ansible_user_dir }}/src/color"
            mode: "0644"
            dir_mode: "0700"
  log: true
verifier:
  name: ansible
