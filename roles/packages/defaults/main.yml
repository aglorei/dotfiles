---
homebrew_brewfile: |
  tap "homebrew/bundle"
  tap "homebrew/cask"
  tap "homebrew/cask-drivers"
  tap "homebrew/cask-versions"
  tap "homebrew/core"
  tap "homebrew/services"
  # Terminal multiplexer
  brew "tmux", args: ["HEAD"]
  # Vi 'workalike' with many additional features
  brew "vim"
  cask "alfred"
homebrew_brews:
  - vim
homebrew_brews_with_options:
  tmux:
    - HEAD
homebrew_casks:
  - alfred
homebrew_taps:
  - homebrew/bundle
  - homebrew/cask
  - homebrew/cask-drivers
  - homebrew/cask-versions
  - homebrew/core
  - homebrew/services

pacman_packages:
  - tmux
  - vim
