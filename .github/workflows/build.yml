---
name: build

on:
  push:
    paths-ignore:
      - README.md
  pull_request:
    branches:
      - master

jobs:
  ansible-lint:
    container:
      image: quay.io/ansible/toolset:0.2
    name: Lint Ansible project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: ansible-lint --force-color
  yamllint:
    container:
      image: quay.io/ansible/toolset:0.2
    name: Lint YAML files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: yamllint --format github --strict .
