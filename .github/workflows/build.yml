---
name: build

on:  # yamllint disable-line rule:truthy
  push:
    paths-ignore:
      - README.md
  pull_request:
    branches:
      - master

jobs:
  ansible-lint:
    container:
      image: quay.io/ansible/toolset:main
    name: Lint Ansible files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: ansible-lint --force-color
  yamllint:
    container:
      image: quay.io/ansible/toolset:main
    name: Lint YAML files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: yamllint --format github --strict .
  molecule:
    container:
      image: quay.io/ansible/toolset:main
    name: Test Ansible roles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: |
          for role in $(ls -d $PWD/roles/*/)
          do
            cd $role
              [ -d molecule ] && molecule test --all
            popd
          done
