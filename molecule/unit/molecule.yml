---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: molecule-archlinux-latest
    image: carlodepieri/docker-archlinux-ansible
    capabilities:
      - SYS_ADMIN
    command: "/usr/sbin/init"
    groups:
      - molecule_group_1
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    pre_build_image: true
  - name: molecule-ubuntu-focal
    image: geerlingguy/docker-ubuntu2004-ansible
    capabilities:
      - SYS_ADMIN
    command: "/usr/sbin/init"
    groups:
      - molecule_group_1
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      stdout_callback: debug
  inventory:
    links:
      group_vars: ../resources/group_vars
  log: true
  playbooks:
    converge: ../resources/playbooks/converge.yml
    verify: ../resources/playbooks/verify.yml
verifier:
  name: ansible
