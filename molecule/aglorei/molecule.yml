---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: molecule-archlinux-latest
    image: carlodepieri/docker-archlinux-ansible
    capabilities:
      - SYS_ADMIN
    command: "/usr/sbin/init"
    groups:
      - aglorei
      - aglorei_Archlinux
      - aglorei_personal
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    pre_build_image: true
  - name: molecule-ubuntu-focal
    image: geerlingguy/docker-ubuntu2004-ansible
    capabilities:
      - SYS_ADMIN
    command: "/usr/sbin/init"
    groups:
      - aglorei
      - aglorei_Ubuntu
      - aglorei_work_1
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      stdout_callback: debug
  log: true
verifier:
  name: ansible
