---
config_dirs:
  - src: "{{ inventory_hostname }}/base16-shell"
    dest: "{{ ansible_user_dir }}/.config/base16-shell"
  - src: "{{ inventory_hostname }}/zsh-syntax-highlighting"
    dest: "{{ ansible_user_dir }}/.zsh"
  - src: "{{ inventory_hostname }}/geometry"
    dest: "{{ ansible_user_dir }}/.geometry"
  - src: "{{ inventory_hostname }}/oh-my-zsh"
    dest: "{{ ansible_user_dir }}/.oh-my-zsh"
config_files: "{{ distribution_files + unix_files + vaulted_files }}"
unix_files:
  - content: "{{ lookup('template', inventory_hostname + '/.gitconfig') }}"
    dest: "{{ ansible_user_dir }}/.gitconfig"
    mode: "0644"
  - content: "{{ lookup('template', inventory_hostname + '/.gitignore_global') }}"
    dest: "{{ ansible_user_dir }}/.gitignore_global"
    mode: "0644"
  - content: "{{ lookup('template', inventory_hostname + '/.tmux.conf') }}"
    dest: "{{ ansible_user_dir }}/.tmux.conf"
    mode: "0644"
  - content: "{{ lookup('template', inventory_hostname + '/.vimrc') }}"
    dest: "{{ ansible_user_dir }}/.vimrc"
    mode: "0644"
  - content: "{{ lookup('template', inventory_hostname + '/.zshrc') }}"
    dest: "{{ ansible_user_dir }}/.zshrc"
    mode: "0644"
  - content: "{{ lookup('template', inventory_hostname + '/gpg-agent.conf') }}"
    dest: "{{ ansible_user_dir }}/.gnupg/gpg-agent.conf"
    mode: "0644"
    dir_mode: "0700"
  - content: "{{ lookup('template', inventory_hostname + '/htoprc') }}"
    dest: "{{ ansible_user_dir }}/.config/htop/htoprc"
    mode: "0644"
    dir_mode: "0700"
  - content: "{{ lookup('template', inventory_hostname + '/init.vim') }}"
    dest: "{{ ansible_user_dir }}/.config/nvim/init.vim"
    mode: "0644"
    dir_mode: "0700"

git:
  core:
    editor: nvim
  # set all vaulted variables in subgroups
  user: "{{ vault_git_user }}"

